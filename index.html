<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIMUL Marketing Visit Tracker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:430px;
background:#ffffff;
border-radius:18px;
padding:25px;
box-shadow:0 12px 30px rgba(0,0,0,0.25);
text-align:center;
}

.logo{
width:90px;
margin:auto;
display:block;
margin-bottom:10px;
}

h2{
color:#2c3e50;
margin-bottom:18px;
font-size:24px;
}

input, textarea{
width:100%;
padding:13px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;
}

textarea{
resize:none;
height:100px;
}

button{
width:100%;
padding:14px;
background:#27ae60;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
margin-top:12px;
font-weight:bold;
}

button:hover{
background:#219150;
}

#status{
margin-top:15px;
font-weight:bold;
font-size:15px;
color:#2c3e50;
}

.footer{
margin-top:18px;
font-size:12px;
color:gray;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>MARKETING VISIT TRACKER</h2>

<input type="text" id="employee" placeholder="Enter Employee Name">

<input type="text" id="shop" placeholder="Enter Agent / Shop Name">

<input type="text" id="route" placeholder="Enter Route Name">

<textarea id="remarks" placeholder="Write Visit / Survey Remarks"></textarea>

<button onclick="sendData()">Visited</button>

<p id="status"></p>

<div class="footer">
VIMUL Team Marketing Tracking System
</div>

</div>

<script>

function sendData(){

var employee=document.getElementById("employee").value.trim();
var shop=document.getElementById("shop").value.trim();
var route=document.getElementById("route").value.trim();
var remarks=document.getElementById("remarks").value.trim();

if(employee=="" || shop=="" || route==""){
alert("Please fill all required details");
return;
}

document.getElementById("status").innerHTML="Getting location...";

if(!navigator.geolocation){
alert("GPS not supported");
return;
}

navigator.geolocation.getCurrentPosition(

function(position){

var lat=position.coords.latitude;
var lon=position.coords.longitude;

document.getElementById("status").innerHTML="Submitting Visit Data...";

fetch("https://script.google.com/macros/s/AKfycbw_pHAuLB6o7kq2BsT9Q7mgOPNncLlwLVsmW4ny4zRBp4UA8poJR6W6CO5nqGS7v_1RIw/exec",{

method:"POST",
mode:"no-cors",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:
"employee="+encodeURIComponent(employee)+
"&shop="+encodeURIComponent(shop)+
"&route="+encodeURIComponent(route)+
"&remarks="+encodeURIComponent(remarks)+
"&action=Visited"+
"&lat="+encodeURIComponent(lat)+
"&lon="+encodeURIComponent(lon)

})

.then(function(){

document.getElementById("status").innerHTML="✅ Visit Submitted Successfully";

document.getElementById("employee").value="";
document.getElementById("shop").value="";
document.getElementById("route").value="";
document.getElementById("remarks").value="";

})

.catch(function(){

document.getElementById("status").innerHTML="❌ Submission Failed";

});

},

function(){

alert("Location permission required");

}

);

}

</script>

</body>
</html>
