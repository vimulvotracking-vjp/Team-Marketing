<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIMUL Marketing </title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:430px;
background:#ffffff;
border-radius:18px;
padding:25px;
box-shadow:0 12px 30px rgba(0,0,0,0.25);
text-align:center;
}

.logo{
width:90px;
display:block;
margin:0 auto 12px;
}

h2{
color:#2c3e50;
margin-bottom:18px;
font-size:24px;
}

input,textarea{
width:100%;
padding:13px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;
}

textarea{
resize:none;
height:95px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:17px;
font-weight:bold;
cursor:pointer;
color:#fff;
background:#27ae60;
}

button:hover{
background:#219150;
}

.logoutBtn{
background:#2c3e50;
}

.logoutBtn:hover{
background:#1f2d3a;
}

#loginStatus,#status{
margin-top:14px;
font-weight:bold;
min-height:22px;
font-size:15px;
color:#2c3e50;
}

.hide{
display:none;
}

.footer{
margin-top:18px;
font-size:12px;
color:gray;
}

.userBox{
background:#f4f6f8;
padding:10px;
border-radius:8px;
margin-bottom:12px;
font-size:14px;
font-weight:bold;
color:#2c3e50;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<!-- LOGIN SECTION -->
<div id="loginBox">

<h2>VIMUL Connect</h2>

<input type="text" id="userid" placeholder="Enter User ID">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="loginUser()">Login</button>

<p id="loginStatus"></p>

</div>

<!-- MAIN SECTION -->
<div id="mainBox" class="hide">

<h2>VIMUL VOICE</h2>

<div class="userBox" id="welcomeUser"></div>

<input type="text" id="shop" placeholder="Enter Agent / Shop Name">

<input type="text" id="route" placeholder="Enter Route Name">

<textarea id="remarks" placeholder="Write Visit / Survey Remarks"></textarea>

<button onclick="sendData()">Visited</button>

<button class="logoutBtn" onclick="logoutUser()">Logout</button>

<p id="status"></p>

</div>

<div class="footer">
Innovated by Kishor N
</div>

</div>

<script>

var scriptURL="https://script.google.com/macros/s/AKfycbz3R9cFhQ-bX5Q4FVYZrxgsyPyVsYM-yPJm2HvoBlvv9GANfqJjsp3Ao4fe8qvSzWB6/exec";

var loggedUserId="";
var loggedUserName="";

/* AUTO LOGIN */
window.onload=function(){

var uid=localStorage.getItem("userid");
var uname=localStorage.getItem("username");

if(uid && uname){
loggedUserId=uid;
loggedUserName=uname;
showMain();
}

};

/* LOGIN */
function loginUser(){

var userid=document.getElementById("userid").value.trim();
var password=document.getElementById("password").value.trim();

if(userid=="" || password==""){
alert("Please enter User ID and Password");
return;
}

document.getElementById("loginStatus").innerHTML="Checking login...";

fetch(scriptURL,{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:
"mode=login"+
"&userid="+encodeURIComponent(userid)+
"&password="+encodeURIComponent(password)
})

.then(function(response){
return response.json();
})

.then(function(data){

if(data.status=="success"){

loggedUserId=data.userid;
loggedUserName=data.name;

localStorage.setItem("userid",data.userid);
localStorage.setItem("username",data.name);

showMain();

}else{
document.getElementById("loginStatus").innerHTML="❌ Invalid Login";
}

})

.catch(function(){
document.getElementById("loginStatus").innerHTML="❌ Network Error";
});

}

/* SHOW MAIN */
function showMain(){

document.getElementById("loginBox").classList.add("hide");
document.getElementById("mainBox").classList.remove("hide");

document.getElementById("welcomeUser").innerHTML=
"Welcome : "+loggedUserName+" ("+loggedUserId+")";

}

/* LOGOUT */
function logoutUser(){

localStorage.clear();
location.reload();

}

/* SEND VISIT */
function sendData(){

var shop=document.getElementById("shop").value.trim();
var route=document.getElementById("route").value.trim();
var remarks=document.getElementById("remarks").value.trim();

if(shop=="" || route==""){
alert("Please fill all required details");
return;
}

document.getElementById("status").innerHTML="📍 Getting location...";

if(!navigator.geolocation){
alert("GPS not supported");
return;
}

navigator.geolocation.getCurrentPosition(

function(position){

var lat=position.coords.latitude;
var lon=position.coords.longitude;
var device=navigator.userAgent;

document.getElementById("status").innerHTML="📡 Sending visit data...";

fetch(scriptURL,{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:
"mode=visit"+
"&userid="+encodeURIComponent(loggedUserId)+
"&username="+encodeURIComponent(loggedUserName)+
"&shop="+encodeURIComponent(shop)+
"&route="+encodeURIComponent(route)+
"&remarks="+encodeURIComponent(remarks)+
"&action=Visited"+
"&lat="+encodeURIComponent(lat)+
"&lon="+encodeURIComponent(lon)+
"&device="+encodeURIComponent(device)
})

.then(function(response){
return response.text();
})

.then(function(result){

document.getElementById("status").innerHTML="✅ Visit Submitted Successfully";

document.getElementById("shop").value="";
document.getElementById("route").value="";
document.getElementById("remarks").value="";

setTimeout(function(){
logoutUser();
},1500);

})

.catch(function(){
document.getElementById("status").innerHTML="❌ Submission Failed";
});

},

function(){
document.getElementById("status").innerHTML="❌ Location permission denied";
},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);

}

</script>

</body>
</html>
